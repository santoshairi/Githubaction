name: secret test
on:
  workflow_dispatch:
jobs:
  secret-check:
    runs-on: ubuntu-latest
    steps:
      - name: check if secret exists
        run: |
          if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "The secret is set: true"
          else
            echo "The secret is set: false"
          fi  

      - name: print secret
        run: echo "The secret is:" ${{secrets.MY_SECRET_MESSAGE}}    

        